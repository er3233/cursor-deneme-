<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Messages | TANIDIK</title>

  <meta
    name="description"
    content="View reservation messages on TANIDIK."
  />

  <meta name="theme-color" content="#050505" />

  <link
    rel="icon"
    href="./assets/favicon.svg"
    type="image/svg+xml"
  />

  <link rel="manifest" href="./manifest.webmanifest" />

  <link rel="apple-touch-icon" href="./assets/icon-192.png" />

  <link
    rel="stylesheet"
    href="./css/style.css"
  />
</head>

<body>

  <nav class="navbar">

    <h1>TANIDIK</h1>

    <button
      class="nav-toggle"
      type="button"
      aria-label="Toggle navigation"
      aria-expanded="false"
    >
      Menu
    </button>

    <div class="nav-links">

      <a href="./index.html">Home</a>

      <a href="./discover.html">Discover</a>

      <a href="./events.html">Events</a>

      <a href="./favorites.html">Favorites</a>

      <a
        href="./auth.html"
        id="authLink"
      >
        Login
      </a>

    </div>

  </nav>

  <main class="messages-page">

    <header class="dashboard-header dashboard-header--messages">
      <h1>
        Messages
      </h1>

      <p class="page-message">
        Reservation conversations with guests and businesses.
      </p>
    </header>

    <section class="messages-layout">

      <aside class="messages-inbox dashboard-section">
        <h2>
          Inbox
        </h2>

        <div
          id="messagesList"
          class="messages-list"
        >
        </div>
      </aside>

      <section
        id="conversationPanel"
        class="conversation-panel dashboard-section"
      >
        <h2>
          Conversation
        </h2>

        <div
          id="conversationMessages"
          class="conversation-messages"
        >
        </div>

        <form
          id="messageForm"
          class="message-form"
        >
          <textarea
            id="messageBody"
            maxlength="1000"
            placeholder="Write a reservation message..."
            required
          ></textarea>

          <button
            type="submit"
            class="btn"
          >
            Send
          </button>
        </form>
      </section>

    </section>

  </main>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js"></script>

  <script src="./js/app.js"></script>

  <div id="toast" class="toast"></div>

</body>
</html>
